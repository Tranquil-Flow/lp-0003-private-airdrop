name: lp0003-safe-lane

on:
  push:
  pull_request:

jobs:
  safe-lane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install pytest
        run: python3 -m pip install pytest
      - name: Safe-lane verification bundle
        run: bash scripts/ci-safe-lane.sh
